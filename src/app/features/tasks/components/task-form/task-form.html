<!-- eslint-disable @angular-eslint/template/prefer-control-flow -->
<form [formGroup]="form" class="task-form" (ngSubmit)="submit()">
  <div class="field-row">
    <label for="title">Título</label>
    <input id="title" type="text" formControlName="title" />
    <div class="field-error" *ngIf="form.controls['title'].touched && form.controls['title'].invalid">
      <span *ngIf="form.controls['title'].errors?.['required']">Título é obrigatório.</span>
      <span *ngIf="form.controls['title'].errors?.['minlength']">Mínimo de 3 caracteres.</span>
      <span *ngIf="form.controls['title'].errors?.['maxlength']">Máximo de 80 caracteres.</span>
    </div>
  </div>

  <div class="field-row">
    <label for="description">Descrição</label>
    <textarea id="description" formControlName="description" rows="4"></textarea>
    <div class="field-error" *ngIf="form.controls['description'].touched && form.controls['description'].invalid">
      <span *ngIf="form.controls['description'].errors?.['maxlength']">Máximo de 300 caracteres.</span>
    </div>
  </div>

  <div class="field-row grid-two">
    <div>
      <label for="status">Status</label>
      <select id="status" formControlName="status">
        <option *ngFor="let option of statusOptions" [value]="option.value">{{ option.label }}</option>
      </select>
      <div class="field-error" *ngIf="form.controls['status'].touched && form.controls['status'].invalid">
        <span>Status é obrigatório.</span>
      </div>
    </div>

    <div>
      <label for="priority">Prioridade</label>
      <select id="priority" formControlName="priority">
        <option *ngFor="let option of priorityOptions" [value]="option.value">{{ option.label }}</option>
      </select>
      <div class="field-error" *ngIf="form.controls['priority'].touched && form.controls['priority'].invalid">
        <span>Prioridade é obrigatória.</span>
      </div>
    </div>
  </div>

  <div class="field-row">
    <label for="assignee">Responsável</label>
    <input id="assignee" type="text" formControlName="assignee" />
  </div>

  <div class="field-row">
    <label for="dueDate">Prazo</label>
    <input id="dueDate" type="date" formControlName="dueDate" />
    <div class="field-error" *ngIf="form.controls['dueDate'].touched && form.controls['dueDate'].invalid">
      <span>Prazo é obrigatório.</span>
    </div>
  </div>

  <div class="actions">
    <button type="button" class="secondary-button" (click)="onCancel()">Cancelar</button>
    <button type="submit" class="primary-button" [disabled]="form.invalid">Salvar</button>
  </div>
</form>

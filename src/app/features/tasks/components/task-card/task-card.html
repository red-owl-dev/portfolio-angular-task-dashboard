<article class="task-card">
  <header class="task-card__header">
    <h2 class="task-card__title">{{ task.title }}</h2>
    <div class="task-card__badges">
      <span class="badge status">{{ statusLabels[task.status] }}</span>
      <span class="badge priority">{{ priorityLabels[task.priority] }}</span>
    </div>
  </header>

  <p class="task-card__description">{{ task.description }}</p>

  <div class="task-card__footer">
    <div>
      <span class="task-card__label">Responsável:</span>
      <span>{{ task.assignee || 'Sem responsável' }}</span>
    </div>
    <div>
      <span class="task-card__label">Prazo:</span>
      <span>{{ task.dueDate | date: 'dd/MM/yyyy' : 'UTC' }}</span>
    </div>
  </div>
</article>

<section class="page-shell">
  <div class="page-header">
    <div>
      <p class="eyebrow">Nova tarefa</p>
      <h1>Adicionar tarefa</h1>
      <p>Use o formulário abaixo para cadastrar uma nova tarefa.</p>
    </div>
  </div>

  @if (error()) {
    <div class="status-message error" role="alert">
      <span>{{ error() }}</span>
      <button type="button" class="status-message__close" (click)="clearError()">Fechar</button>
    </div>
  }

  <app-task-form
    [saving]="saving()"
    (taskSaved)="onSave($event)"
    (canceled)="onCancel()"
  ></app-task-form>
</section>

<section class="page-shell">
  <div class="page-header">
    <div>
      <p class="eyebrow">Editar tarefa</p>
      <h1>Atualizar tarefa</h1>
      <p>Altere os detalhes da tarefa e salve para atualizar.</p>
    </div>
  </div>

  <!-- eslint-disable @angular-eslint/template/prefer-control-flow -->
  <div *ngIf="loading()" class="status-message" aria-live="polite">Carregando tarefa...</div>

  <div *ngIf="error() && !loading()" class="status-message error" role="alert">
    <span>{{ error() }}</span>
    <button type="button" class="status-message__close" (click)="clearError()">Fechar</button>
  </div>

  <ng-container *ngIf="task() && !loading()">
    <app-task-form
      [task]="task()"
      [saving]="saving()"
      (taskSaved)="onSave($event)"
      (canceled)="onCancel()"
    ></app-task-form>
  </ng-container>
</section>
